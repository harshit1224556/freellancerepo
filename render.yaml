services:
  - type: web
    name: growing-india
    env: php
    plan: free
    buildCommand: "bash ./build.sh"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_NAME
        value: "Growing India"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: "/opt/render/project/src/database/database.sqlite"
